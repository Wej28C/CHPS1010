# CI — Tests automatiques à chaque push/PR sur main
#
# Tourne sur les serveurs gratuits de GitHub (Ubuntu 22.04).
# Vérifie :
#   1. Qualité du code (flake8)
#   2. Correction du code (pytest — 53 tests unitaires)
#
# NOTE PYTHON VERSION :
#   On utilise Python 3.11 uniquement.
#   - 3.11 = version stable sur les clusters HPC (ROMEO inclus)
#   - 3.13 est exclu : la librairie `ta` (C extension) et certains
#     wheels PyTorch ne sont pas encore disponibles pour cp313

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # flake8 seul — pas besoin d'installer torch pour vérifier le style
      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: |
          flake8 models/ scripts/ tests/ \
            --count \
            --select=E9,F401,F811,F841,W6 \
            --show-source \
            --statistics
        # E9   = erreurs de syntaxe Python (bloquant — le code ne tourne pas)
        # F401 = import non utilisé
        # F811 = redéfinition d'un import
        # F841 = variable locale jamais utilisée
        # W6   = fonctionnalités dépréciées

  test:
    name: Tests (Python 3.11)
    runs-on: ubuntu-22.04
    # Le job test dépend du lint — inutile de lancer les tests si le code
    # contient des erreurs de syntaxe
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # ── PyTorch CPU ─────────────────────────────────────────────────────────
      # Sur Linux, pip install torch installe par défaut la version CUDA (~2Go).
      # On force la version CPU (~180Mo) — GitHub Actions n'a pas de GPU.
      # On cible torch 2.2.* qui a des wheels cp311 stables.
      - name: Install PyTorch CPU
        run: |
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu

      # ── Autres dépendances ──────────────────────────────────────────────────
      # torch étant déjà installé, pip le skip et installe le reste
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Tests ───────────────────────────────────────────────────────────────
      - name: Run pytest
        env:
          PYTHONUTF8: "1"
          PYTHONWARNINGS: "ignore::DeprecationWarning,ignore::UserWarning"
        run: |
          python -m pytest tests/ --tb=short -v
